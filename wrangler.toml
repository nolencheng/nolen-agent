name = "nolen-agent"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[site]
bucket = "."

[env.production]
vars = { ENVIRONMENT = "production", ANALYSIS_TIMEOUT = "30000", RATE_LIMIT_REQUESTS = "10", RATE_LIMIT_WINDOW = "60000", LOG_LEVEL = "info" }

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "sva-rate-limit"
preview_id = "sva-rate-limit-preview"

# D1 Database binding for presets and user data
[[d1_databases]]
binding = "DB"
database_name = "sva-generator"
database_id = "sva-generator-db"
preview_database_id = "sva-generator-preview"
